<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<header class="site-header" th:fragment="header(activePage)">
  <div class="container">
    <nav class="navbar">

      <!-- Brand -->
      <a href="/" class="navbar-brand">
        <div class="brand-icon">📡</div>
        [[${brandName}]]
      </a>

      <!-- Search (center) -->
      <div class="header-search">
        <form id="siteSearchForm" onsubmit="return false;" class="search-form" style="display:flex;align-items:center;">
          <input id="siteSearchInput" type="search" placeholder="Tìm sản phẩm, dịch vụ..." aria-label="Tìm kiếm" autocomplete="off" />
          <button id="siteSearchBtn" type="button" class="btn">🔍</button>
        </form>
        <div id="searchDropdown" class="search-dropdown" style="display:none;"></div>
      </div>

      <!-- Nav links -->
      <ul class="navbar-nav" id="navMenu">
        <li><a href="/"         th:classappend="${activePage == 'home'}     ? 'active'">Trang chủ</a></li>
        <li><a href="/services" th:classappend="${activePage == 'services'} ? 'active'">Dịch vụ</a></li>
        <li><a href="/contact" class="btn btn-accent btn-sm"
               style="margin-left:8px; border:none; box-shadow:0 2px 8px rgba(245,158,11,.3);">
          📞 Tư vấn ngay
        </a></li>
        <li style="margin-left:4px;">
          <a href="/cart" class="cart-nav-link" th:classappend="${activePage == 'cart'} ? 'active'"
             style="padding:6px 10px; border-radius:var(--radius); font-size:1.2rem; position:relative; display:inline-flex;">
            🛒
            <span class="cart-badge" style="display:none;">0</span>
          </a>
        </li>
      </ul>

      <!-- Mobile toggle -->
      <button class="navbar-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </div>

  <!-- Header bottom row: mega menu (full-width, below navbar) -->
  <div class="header-bottom-bar">
    <div class="container" style="position:relative;">
      <div class="services-mega-menu-container" id="headerMenuContainer" style="margin-bottom:0;width:100%;">
        <button class="services-menu-trigger" id="headerMenuTrigger">
          📋 Danh mục sản phẩm ▾
        </button>
        <div class="services-mega-menu-dropdown" id="headerMenuDropdown" style="width:100%;left:0;right:0;">
          <div class="nav-mega-content" id="headerMenuContent"></div>
        </div>
      </div>
    </div>
  </div>
</header>

</body>
</html>
