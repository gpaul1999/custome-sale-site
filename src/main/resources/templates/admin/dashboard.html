<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Dashboard')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <h1>🏠 Dashboard</h1>
    <span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span>
  </div>
  <div class="admin-content">
    <div th:if="${successMsg}" class="flash-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}"   class="flash-error"   th:text="${errorMsg}"></div>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:20px;margin-bottom:32px;">
      <div style="background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;">
        <div style="font-size:2rem;font-weight:800;color:#1a237e;" th:text="${productTypeCount}">0</div>
        <div style="font-size:.85rem;color:#90a4ae;margin-top:4px;">Loại sản phẩm</div>
        <a th:href="@{/admin/product-types}" style="font-size:.8rem;color:#1a237e;margin-top:8px;display:block;">Quản lý →</a>
      </div>
      <div style="background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;">
        <div style="font-size:2rem;font-weight:800;color:#1a237e;" th:text="${categoryCount}">0</div>
        <div style="font-size:.85rem;color:#90a4ae;margin-top:4px;">Danh mục sản phẩm</div>
        <a th:href="@{/admin/product-categories}" style="font-size:.8rem;color:#1a237e;margin-top:8px;display:block;">Quản lý →</a>
      </div>
      <div style="background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;">
        <div style="font-size:2rem;font-weight:800;color:#1a237e;" th:text="${brandCount}">0</div>
        <div style="font-size:.85rem;color:#90a4ae;margin-top:4px;">Thương hiệu</div>
        <a th:href="@{/admin/brands}" style="font-size:.8rem;color:#1a237e;margin-top:8px;display:block;">Quản lý →</a>
      </div>
      <div style="background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;">
        <div style="font-size:2rem;font-weight:800;color:#1a237e;" th:text="${productCount}">0</div>
        <div style="font-size:.85rem;color:#90a4ae;margin-top:4px;">Sản phẩm</div>
        <a th:href="@{/admin/products}" style="font-size:.8rem;color:#1a237e;margin-top:8px;display:block;">Quản lý →</a>
      </div>
      <div style="background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;">
        <div style="font-size:2rem;font-weight:800;color:#1a237e;" th:text="${userCount}">0</div>
        <div style="font-size:.85rem;color:#90a4ae;margin-top:4px;">Người dùng</div>
        <a th:href="@{/admin/users}" style="font-size:.8rem;color:#1a237e;margin-top:8px;display:block;">Quản lý →</a>
      </div>
    </div>
    <div style="background:#fff;border-radius:8px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,.06);">
      <p style="margin:0;font-size:.88rem;color:#546e7a;">
        Chào mừng đến với trang quản trị. Chọn mục từ sidebar để quản lý dữ liệu.
      </p>
    </div>
  </div>
</div>
</body>
</html>
