<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:fragment="head(pageTitle)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle} + ' – Admin'">Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { display:flex; background:#f0f2f5; font-family: inherit; overflow: hidden; }

    /* ── Sidebar ── */
    .admin-sidebar {
      width: 240px; height: 100vh; flex-shrink: 0;
      background: #1a237e;
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-brand {
      padding: 20px 20px 16px;
      font-size: 1.1rem; font-weight: 800;
      color: #fff; border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .sidebar-brand span { color: #ffab40; }
    .sidebar-nav { list-style: none; margin: 0; padding: 12px 0; flex: 1; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px;
      color: rgba(255,255,255,.75);
      font-size: .88rem; font-weight: 500;
      text-decoration: none;
      transition: background .2s, color .2s;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: rgba(255,255,255,.12); color: #fff;
    }
    .sidebar-nav .nav-section {
      padding: 16px 20px 6px;
      font-size: .7rem; font-weight: 700;
      color: rgba(255,255,255,.4);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .sidebar-footer a { color: rgba(255,255,255,.6); font-size:.82rem; text-decoration:none; }
    .sidebar-footer a:hover { color: #fff; }

    /* ── Main ── */
    .admin-main {
      flex: 1;
      display: flex; flex-direction: column;
      height: 100vh;
      overflow-y: auto;   /* scroll xảy ra ở đây, không phải body */
      min-width: 0;
    }
    .admin-topbar {
      background: #fff; padding: 0 28px;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      position: sticky; top: 0; z-index: 100;   /* sticky trong admin-main scroll */
      flex-shrink: 0;
    }
    .admin-topbar h1 { font-size: 1rem; font-weight: 700; color: #1a237e; margin: 0; }
    .admin-content { padding: 28px; flex: 1; }

    /* ── Table wrapper — scroll ngang khi màn hình hẹp ── */
    .table-wrapper { overflow-x: auto; }

    /* ── Flash ── */
    .flash-success {
      background: #e8f5e9; color: #2e7d32;
      border-left: 4px solid #43a047;
      padding: 12px 18px; border-radius: 6px; margin-bottom: 20px; font-size: .9rem;
    }
    .flash-error {
      background: #fce4ec; color: #c62828;
      border-left: 4px solid #e53935;
      padding: 12px 18px; border-radius: 6px; margin-bottom: 20px; font-size: .9rem;
    }

    /* ── Table ── */
    .admin-table { width:100%; border-collapse:collapse; background:#fff;
      border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .admin-table th {
      background:#f5f7fa; padding:12px 16px; text-align:left;
      font-size:.8rem; font-weight:700; color:#546e7a;
      text-transform:uppercase; letter-spacing:.06em;
      border-bottom:1px solid #e0e0e0;
    }
    .admin-table td { padding:11px 16px; font-size:.88rem; border-bottom:1px solid #f5f5f5; color:#37474f; }
    .admin-table tr:last-child td { border-bottom:none; }
    .admin-table tr:hover td { background:#fafafa; }

    /* ── Badges ── */
    .badge-on  { background:#e8f5e9; color:#2e7d32; padding:3px 10px; border-radius:12px; font-size:.75rem; font-weight:700; }
    .badge-off { background:#fce4ec; color:#c62828; padding:3px 10px; border-radius:12px; font-size:.75rem; font-weight:700; }

    /* ── Card / Form ── */
    .admin-card {
      background:#fff; border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,.06);
      padding:28px 32px; max-width:760px;
    }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .field label { font-size:.82rem; font-weight:700; color:#546e7a; }
    .field input, .field select, .field textarea {
      padding:9px 12px; border:1.5px solid #e0e0e0;
      border-radius:6px; font-size:.9rem; font-family:inherit; outline:none;
      transition:border-color .2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color:#1a237e; }
    .field textarea { resize:vertical; min-height:80px; }
    .field-hint { font-size:.75rem; color:#90a4ae; margin-top:2px; }

    /* ── Dynamic list ── */
    .dynamic-list { display:flex; flex-direction:column; gap:6px; }
    .dynamic-list-item { display:flex; gap:6px; align-items:center; }
    .dynamic-list-item input { flex:1; }
    .btn-remove-item {
      background:#fce4ec; color:#c62828; border:none;
      border-radius:6px; padding:6px 10px; cursor:pointer; font-size:.82rem; flex-shrink:0;
    }
    .btn-add-item {
      background:#e3f2fd; color:#1565c0; border:none;
      border-radius:6px; padding:7px 14px; cursor:pointer;
      font-size:.82rem; font-weight:600; margin-top:4px; align-self:flex-start;
    }

    /* ── Buttons ── */
    .btn-admin-primary {
      background:#1a237e; color:#fff; border:none;
      padding:10px 24px; border-radius:6px; font-size:.9rem; font-weight:600;
      cursor:pointer; text-decoration:none; display:inline-block;
    }
    .btn-admin-primary:hover { background:#283593; color:#fff; }
    .btn-admin-secondary {
      background:#f5f5f5; color:#37474f; border:none;
      padding:10px 20px; border-radius:6px; font-size:.9rem; font-weight:600;
      cursor:pointer; text-decoration:none; display:inline-block;
    }
    .btn-admin-secondary:hover { background:#e0e0e0; }
    .btn-admin-warn {
      background:#fff3e0; color:#e65100; border:none;
      padding:6px 14px; border-radius:6px; font-size:.8rem; font-weight:600; cursor:pointer;
      text-decoration:none; display:inline-block;
    }
    .btn-admin-warn:hover { background:#ffe0b2; }
    .btn-admin-danger {
      background:#fce4ec; color:#c62828; border:none;
      padding:6px 14px; border-radius:6px; font-size:.8rem; font-weight:600; cursor:pointer;
    }
    .btn-admin-danger:hover { background:#ffcdd2; }
    .page-header {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;
    }
    .page-header h2 { font-size:1.3rem; color:#1a237e; margin:0; }
  </style>
</head>
<body>

<!--/*
  Fragment chính: sidebar + topbar + content slot
  Dùng: th:replace="~{admin/fragments/layout :: layout}"
  Rồi dùng th:ref để inject <title> và <main>
*/-->

<div th:fragment="sidebar">
  <div class="admin-sidebar">
    <div class="sidebar-brand">⚙️ <span>Admin</span> Panel</div>
    <ul class="sidebar-nav">
      <li><div class="nav-section">Tổng quan</div></li>
      <li><a th:href="@{/admin/dashboard}">🏠 Dashboard</a></li>
      <li><div class="nav-section">Danh mục</div></li>
      <li><a th:href="@{/admin/product-types}">📂 Loại sản phẩm</a></li>
      <li><a th:href="@{/admin/product-categories}">📑 Danh mục con</a></li>
      <li><a th:href="@{/admin/brands}">🏢 Thương hiệu</a></li>
      <li><div class="nav-section">Sản phẩm</div></li>
      <li><a th:href="@{/admin/products}">📦 Sản phẩm</a></li>
      <li><a th:href="@{/admin/promotions}">🎁 Khuyến mãi</a></li>
      <li><div class="nav-section">Hệ thống</div></li>
      <li><a th:href="@{/admin/users}">👤 Người dùng</a></li>
    </ul>
    <div class="sidebar-footer">
      <a th:href="@{/admin/logout}">🚪 Đăng xuất</a>
    </div>
  </div>
</div>

</body>
</html>
