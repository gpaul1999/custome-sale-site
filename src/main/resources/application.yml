spring:
  application:
    name: authentication-service

  # Default profile: H2 in-memory (dev / test)
  datasource:
    url: ${DB_URL:jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: none          # Flyway manages schema
    show-sql: true
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production-must-be-at-least-256-bits-long-for-security}
  expiration: ${JWT_EXPIRATION:86400000}

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

logging:
  level:
    com.example.authservice: DEBUG
    org.springframework.security: DEBUG
